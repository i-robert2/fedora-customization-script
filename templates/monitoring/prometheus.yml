# Prometheus configuration for KVM/QEMU VM monitoring
#
# Scrapes node_exporter on all VMs + Prometheus itself.
# Edit the targets below with your actual VM IPs.
#
# Usage:
#   Copied to ~/monitoring/prometheus/ by the monitoring module.
#   Edit targets: nano ~/monitoring/prometheus/prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus monitors itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # KVM/QEMU VMs running node_exporter on port 9100
  - job_name: "vms"
    static_configs:
      - targets:
          - "192.168.122.10:9100"
          - "192.168.122.11:9100"
          - "192.168.122.12:9100"
          - "192.168.122.20:9100"
          - "192.168.122.21:9100"
        labels:
          env: "local"

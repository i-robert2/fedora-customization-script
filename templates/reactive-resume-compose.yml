# Reactive Resume — Self-hosted resume builder
#
# Start with: podman-compose -f ~/reactive-resume/compose.yml up -d
# Stop with:  podman-compose -f ~/reactive-resume/compose.yml down
# Access at:  http://localhost:3002
#
# Services: PostgreSQL, Browserless (PDF rendering), SeaweedFS (file storage), Reactive Resume

name: reactive_resume

volumes:
  postgres_data:
  seaweedfs_data:
  reactive_resume_data:

services:
  postgres:
    image: docker.io/postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: rxresume
      POSTGRES_USER: rxresume
      POSTGRES_PASSWORD: rxresume
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "rxresume", "-d", "rxresume"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

  browserless:
    image: ghcr.io/browserless/chromium:latest
    restart: unless-stopped
    environment:
      QUEUED: "10"
      HEALTH: "true"
      CONCURRENT: "5"
      TOKEN: "1234567890"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/pressure?token=1234567890"]
      interval: 10s
      timeout: 5s
      retries: 10

  seaweedfs:
    image: docker.io/chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: server -s3 -filer -dir=/data -ip=0.0.0.0
    environment:
      AWS_ACCESS_KEY_ID: seaweedfs
      AWS_SECRET_ACCESS_KEY: seaweedfs
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

  seaweedfs_create_bucket:
    image: quay.io/minio/mc:latest
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set seaweedfs http://seaweedfs:8333 seaweedfs seaweedfs;
        mc mb seaweedfs/reactive-resume;
        exit 0;
      "
    depends_on:
      seaweedfs:
        condition: service_healthy

  reactive_resume:
    image: docker.io/amruthpillai/reactive-resume:latest
    restart: unless-stopped
    environment:
      TZ: "Etc/UTC"
      NODE_ENV: production
      APP_URL: "http://localhost:3002"
      PRINTER_APP_URL: "http://reactive_resume:3000"
      PRINTER_ENDPOINT: "ws://browserless:3000?token=1234567890"
      DATABASE_URL: "postgresql://rxresume:rxresume@postgres:5432/rxresume"
      AUTH_SECRET: "change-me-to-a-secure-secret-key-in-production"
      S3_ACCESS_KEY_ID: seaweedfs
      S3_SECRET_ACCESS_KEY: seaweedfs
      S3_ENDPOINT: "http://seaweedfs:8333"
      S3_BUCKET: reactive-resume
      S3_FORCE_PATH_STYLE: "true"
    volumes:
      - reactive_resume_data:/app/data
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
      browserless:
        condition: service_healthy
      seaweedfs_create_bucket:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      start_period: 10s
      interval: 30s
      timeout: 10s
      retries: 3

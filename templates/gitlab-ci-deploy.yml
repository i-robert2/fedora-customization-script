# GitLab CI/CD — Deploy to KVM/QEMU VM
#
# This pipeline deploys your project to a KVM/QEMU VM via SSH
# whenever you push to the main branch.
#
# Prerequisites:
#   1. GitLab Runner registered with shell executor (see gitlab.sh module)
#   2. Deploy SSH key copied to the VM:
#      ssh-copy-id -i ~/.ssh/gitlab-deploy.pub deploy@VM_IP
#   3. Replace VM_IP below with your VM's actual IP address
#      (find it with: virsh domifaddr YOUR_VM_NAME)
#   4. Replace /opt/myapp with your app's deploy path on the VM
#
# Usage:
#   Copy this file to your GitLab project root as .gitlab-ci.yml

variables:
  VM_IP: "192.168.122.100"       # Replace with your VM's IP
  VM_USER: "deploy"              # User on the VM
  DEPLOY_PATH: "/opt/myapp"      # Where the app lives on the VM
  SSH_KEY: "~/.ssh/gitlab-deploy" # Deploy key (generated by gitlab.sh module)
  SSH_OPTS: "-o StrictHostKeyChecking=no -i $SSH_KEY"

stages:
  - test
  - deploy

# ── Test stage (optional, add your tests here) ──────────────────────
test:
  stage: test
  script:
    - echo "Running tests..."
    # Add your test commands here, e.g.:
    # - cd $CI_PROJECT_DIR && make test
    # - pytest
    # - npm test
  only:
    - main

# ── Deploy to VM ────────────────────────────────────────────────────
deploy:
  stage: deploy
  script:
    # Sync project files to the VM
    - rsync -avz --delete -e "ssh $SSH_OPTS" "$CI_PROJECT_DIR/" "$VM_USER@$VM_IP:$DEPLOY_PATH/"

    # Run post-deploy commands on the VM (restart service, etc.)
    - ssh $SSH_OPTS "$VM_USER@$VM_IP" "cd $DEPLOY_PATH && echo 'Deploy complete at $(date)'"

    # Example: restart a systemd service after deploy
    # - ssh $SSH_OPTS "$VM_USER@$VM_IP" "sudo systemctl restart myapp"

    # Example: restart a Podman container after deploy
    # - ssh $SSH_OPTS "$VM_USER@$VM_IP" "podman restart myapp"
  only:
    - main
  environment:
    name: production
    url: "http://$VM_IP"

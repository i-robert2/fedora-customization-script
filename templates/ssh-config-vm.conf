# SSH config for KVM/QEMU VMs
#
# Add this to ~/.ssh/config or include it with:
#   Include ~/.ssh/config.d/vms.conf
#
# Usage:
#   1. Copy this file: cp templates/ssh-config-vm.conf ~/.ssh/config.d/vms.conf
#   2. Edit the Host entries below with your actual VM IPs
#   3. Copy your deploy key to each VM:
#      ssh-copy-id -i ~/.ssh/gitlab-deploy.pub deploy@VM_IP
#   4. Now you can: ssh web1, ssh db1, etc.

# ── Defaults for all VMs ────────────────────────────────────────────
Host vm-*
    User deploy
    IdentityFile ~/.ssh/gitlab-deploy
    StrictHostKeyChecking no
    ConnectTimeout 5

# ── Web servers ─────────────────────────────────────────────────────
Host vm-web1
    HostName 192.168.122.10

Host vm-web2
    HostName 192.168.122.11

Host vm-web3
    HostName 192.168.122.12

# ── Database servers ────────────────────────────────────────────────
Host vm-db1
    HostName 192.168.122.20

Host vm-db2
    HostName 192.168.122.21


# Ansible Inventory — KVM/QEMU VMs
#
# Usage:
#   1. Copy to your project: cp templates/ansible/inventory.ini ./inventory.ini
#   2. Edit host IPs and group names to match your VMs
#   3. Run: ansible-playbook -i inventory.ini playbook.yml
#
# Find VM IPs with: virsh domifaddr YOUR_VM_NAME

[webservers]
vm-web1 ansible_host=192.168.122.10
vm-web2 ansible_host=192.168.122.11
vm-web3 ansible_host=192.168.122.12

[databases]
vm-db1 ansible_host=192.168.122.20
vm-db2 ansible_host=192.168.122.21

# Add more groups as needed:
# [appservers]
# vm-app1 ansible_host=192.168.122.30
# vm-app2 ansible_host=192.168.122.31

# ── Shared variables for all VMs ────────────────────────────────────
[all:vars]
ansible_user=deploy
ansible_ssh_private_key_file=~/.ssh/gitlab-deploy
ansible_ssh_common_args=-o StrictHostKeyChecking=no

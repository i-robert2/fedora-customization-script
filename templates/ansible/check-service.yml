# Ansible Playbook — Check and manage services on VMs
#
# Usage:
#   # Check a service on all VMs:
#   ansible-playbook -i inventory.ini check-service.yml -e "service_name=nginx"
#
#   # Check on webservers only:
#   ansible-playbook -i inventory.ini check-service.yml -e "service_name=nginx" --limit webservers
#
#   # Restart a service:
#   ansible-playbook -i inventory.ini check-service.yml -e "service_name=nginx service_action=restarted"
---
- name: Service check/manage
  hosts: all
  become: true

  vars:
    service_name: ""
    service_action: ""  # leave empty to just check status; set to started/stopped/restarted to change

  tasks:
    - name: Validate service name is provided
      fail:
        msg: "Set service_name: ansible-playbook ... -e 'service_name=nginx'"
      when: service_name == ""

    - name: Check service status
      command: "systemctl status {{ service_name }} --no-pager"
      register: svc_status
      changed_when: false
      failed_when: false

    - name: Show service status
      debug:
        msg: |
          ── {{ inventory_hostname }} — {{ service_name }} ──
          {{ svc_status.stdout }}
      when: service_action == ""

    - name: Manage service (start/stop/restart)
      systemd:
        name: "{{ service_name }}"
        state: "{{ service_action }}"
      when: service_action != ""

    - name: Confirm action
      debug:
        msg: "{{ inventory_hostname }}: {{ service_name }} → {{ service_action }}"
      when: service_action != ""

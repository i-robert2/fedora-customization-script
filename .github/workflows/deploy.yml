name: Fedora Setup — Lint & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'setup.sh'
      - 'modules/**'
      - '.github/workflows/deploy.yml'

jobs:
  # ── CI: Lint the script ───────────────────────────────────────────────
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint setup.sh and modules
        run: shellcheck --severity=error setup.sh modules/*.sh

  # ── CD: Deploy to VM ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Fedora VM
    needs: lint
    runs-on: [self-hosted, fedora]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Make scripts executable
        run: chmod +x setup.sh modules/*.sh

      - name: Detect changed modules
        id: modules
        run: |
          # If setup.sh itself changed, run all modules
          if git diff --name-only HEAD~1 HEAD | grep -q '^setup.sh$'; then
            echo "modules=all" >> "$GITHUB_OUTPUT"
            echo "setup.sh changed — will run all modules."
            exit 0
          fi

          # Check which module files changed
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- modules/ \
            | sed 's|modules/||;s|\.sh$||' \
            | tr '\n' ' ' \
            | sed 's/ $//')

          if [ -z "$CHANGED" ]; then
            echo "modules=all" >> "$GITHUB_OUTPUT"
            echo "No module files changed — will run all (safety fallback)."
          else
            echo "modules=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "Changed modules: $CHANGED"
          fi

      - name: Run setup.sh (changed modules only)
        env:
          DBUS_SESSION_BUS_ADDRESS: unix:path=/run/user/1000/bus
          DISPLAY: ":1"
        run: |
          MODS="${{ steps.modules.outputs.modules }}"
          if [ "$MODS" = "all" ]; then
            echo "Running all modules..."
            ./setup.sh
          else
            echo "Running only: $MODS"
            ./setup.sh $MODS
          fi
